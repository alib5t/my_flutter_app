workflows:
  ios_ipa:
    name: iOS IPA Build

    working_directory: my_app

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - flutter clean
      - flutter pub get
      - flutter build ipa --no-codesign

artifacts:
  - build/ios/ipa/ss/s.ipa
  - build/ios/ss/s.ipa
  - build/ss/s.ipa
