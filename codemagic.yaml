workflows:
  ios_ipa:
    name: iOS IPA (Guaranteed Fix)

    environment:
      flutter: stable
      xcode: latest

    working_directory: my_app

    scripts:
      - flutter clean
      - flutter pub get

      # 1. iOS build zorla
      - flutter build ios --release --no-codesign

      # 2. IPA export (gerçek yöntem)
      - cd ios
      - mkdir -p build_output

    artifacts:
      - ios/build_output/*.ipa
      - ios/build_output/**/*.ipa
