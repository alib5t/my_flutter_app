workflows:
  ios_ipa_build:
    name: iOS IPA Build (Clean)

    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    working_directory: my_app

    cache:
      cache_paths:
        - ~/.pub-cache
        - $HOME/.cocoapods

    scripts:
      - name: Clean project
        script: flutter clean

      - name: Get dependencies
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: Build IPA (NO SIGN)
        script: flutter build ipa --no-codesign --verbose

    artifacts:
      - build/ios/ipa/**/*.ipa
      - build/ios/**/*.ipa
      - build/**/Runner.app
