workflows:
  ios_build:
    name: iOS App (Stable Build)

    environment:
      flutter: stable
      xcode: latest

    working_directory: my_app

    scripts:
      - flutter clean
      - flutter pub get

      # SADECE APP üret
      - flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/Runner.app
