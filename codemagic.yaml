workflows:
  ios_ipa:
    name: iOS IPA (Fixed)

    environment:
      flutter: stable
      xcode: latest

    working_directory: my_app

    scripts:
      - cd my_app
      - flutter clean
      - flutter pub get
      - flutter build ipa --no-codesign

    artifacts:
      - my_app/build/ios/ipa/**/*.ipa
      - my_app/build/**/*.ipa
