workflows:
  ios_ipa:
    name: iOS IPA (Simple & Working)

    environment:
      flutter: stable
      xcode: latest

    working_directory: my_app

    scripts:
      - flutter clean
      - flutter pub get

      # IPA üretimi (tek gerçek adım)
      - flutter build ipa --no-codesign

    artifacts:
      - build/ios/ipa/**/*.ipa
